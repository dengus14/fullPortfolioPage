<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #0d0f1e;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #app { width: 100%; height: 100%; position: relative; }

      canvas.webgl { position: fixed; top: 0; left: 0; outline: none; z-index: 0; }
      #css-renderer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 1;
      }
      #ui {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10; pointer-events: none;
      }
      #loading-screen {
        position: absolute; inset: 0; background: #c8c8c8;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #222; pointer-events: all; transition: opacity 0.8s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      #loading-bar-container {
        width: 300px; height: 2px; background: #aaa;
        margin-top: 24px; border-radius: 2px; overflow: hidden;
      }
      #loading-bar { height: 100%; width: 0%; background: #333; transition: width 0.3s ease; border-radius: 2px; }
      #loading-text { margin-top: 16px; font-size: 13px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
      #loading-title { font-size: 28px; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; }
      #info-overlay {
        position: absolute; bottom: 40px; left: 40px;
        pointer-events: none; opacity: 0; transition: opacity 1s ease;
      }
      #info-overlay.visible { opacity: 1; }
      #info-name { font-size: 32px; font-weight: 300; color: #fff; letter-spacing: 0.15em; text-transform: uppercase; }
      #info-title { font-size: 14px; color: #aaa; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 6px; }
      #monitor-hint {
        position: absolute; bottom: 40px; right: 40px; color: #555;
        font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
        opacity: 0; transition: opacity 1s ease; pointer-events: none;
      }
      #monitor-hint.visible { opacity: 1; }

      /* ── Landing ──────────────────────────────────────────────── */

      #landing {
        position: fixed; inset: 0; z-index: 200;
        display: flex; align-items: center; justify-content: center;
        background:
          radial-gradient(ellipse 60% 50% at 20% 30%, rgba(91,106,240,0.12) 0%, transparent 70%),
          radial-gradient(ellipse 50% 60% at 80% 70%, rgba(139,92,246,0.1) 0%, transparent 70%),
          linear-gradient(160deg, #0d0f1e 0%, #111827 45%, #0f172a 100%);
        will-change: transform, opacity;
        /* entrance */
        animation: landingReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes landingReveal {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* exit — screen lifts upward */
      #landing.lifting {
        animation: liftUp 0.65s cubic-bezier(0.4, 0, 0.8, 1) forwards;
        pointer-events: none;
      }
      @keyframes liftUp {
        0%   { transform: translateY(0)       scaleX(1);     opacity: 1; }
        12%  { transform: translateY(-8px)    scaleX(0.997); opacity: 1; }
        100% { transform: translateY(-102vh)  scaleX(0.97);  opacity: 0.6; }
      }

      /* ── Card ──────────────────────────────────────────────────── */

      #landing-card {
        position: relative; z-index: 1;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(32px) saturate(180%);
        -webkit-backdrop-filter: blur(32px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 48px 52px;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.04) inset,
          0 24px 60px rgba(0, 0, 0, 0.45),
          0 4px 16px rgba(0, 0, 0, 0.3);
        display: flex; flex-direction: column; align-items: center;
        max-width: 500px; width: 90%;
        opacity: 0;
        animation: cardReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
      }
      @keyframes cardReveal {
        from { opacity: 0; transform: translateY(24px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0)    scale(1); }
      }

      #landing-name {
        font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
        color: #f0f2ff; text-align: center;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.35s forwards;
      }
      #landing-role {
        font-size: 12px; font-weight: 400; letter-spacing: 0.14em;
        text-transform: uppercase; color: rgba(180,188,255,0.5);
        margin-top: 7px; text-align: center;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.42s forwards;
      }
      #landing-divider {
        width: 32px; height: 1px; background: rgba(255,255,255,0.12);
        margin: 28px 0;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.48s forwards;
      }
      #landing-prompt {
        font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
        text-transform: uppercase; color: rgba(107,123,245,0.9);
        margin-bottom: 18px;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.52s forwards;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Buttons ───────────────────────────────────────────────── */

      #landing-options {
        display: flex; gap: 12px; width: 100%;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.58s forwards;
      }

      .landing-btn {
        flex: 1;
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        padding: 22px 16px; border-radius: 14px; cursor: pointer;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.09);
        color: inherit;
        transition: background 0.2s ease, border-color 0.2s ease,
                    transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.2s ease;
      }
      .landing-btn:hover {
        background: rgba(91, 106, 240, 0.1);
        border-color: rgba(107, 123, 245, 0.4);
        transform: translateY(-3px);
        box-shadow: 0 8px 28px rgba(91,106,240,0.18), 0 0 0 1px rgba(107,123,245,0.2) inset;
      }
      .landing-btn:active {
        transform: translateY(-1px) scale(0.98);
        transition-duration: 0.08s;
      }

      .landing-btn-icon {
        font-size: 22px; color: #6b7bf5; line-height: 1;
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .landing-btn:hover .landing-btn-icon { transform: scale(1.18); }

      .landing-btn-label {
        font-size: 13px; font-weight: 600; color: #e8eaff;
      }
      .landing-btn-desc {
        font-size: 11px; color: rgba(180,188,255,0.4);
        text-align: center; line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="css-renderer"></div>

      <div id="ui">
        <div id="loading-screen">
          <div id="loading-title">Portfolio</div>
          <div id="loading-bar-container"><div id="loading-bar"></div></div>
          <div id="loading-text">Loading assets...</div>
        </div>
        <div id="info-overlay">
          <div id="info-name">Your Name</div>
          <div id="info-title">Software Engineer</div>
        </div>
        <div id="monitor-hint">Click a monitor to explore</div>
      </div>

      <!-- Landing choice screen -->
      <div id="landing">
        <div id="landing-card">
          <div id="landing-name">Your Name</div>
          <div id="landing-role">Software Engineer · Creative Developer</div>
          <div id="landing-divider"></div>
          <div id="landing-prompt">Choose your experience</div>
          <div id="landing-options">
            <button class="landing-btn" id="btn-3d" aria-label="Open 3D Experience">
              <span class="landing-btn-icon">◈</span>
              <span class="landing-btn-label">3D Experience</span>
              <span class="landing-btn-desc">Interactive 3D environment</span>
            </button>
            <button class="landing-btn" id="btn-classic" aria-label="Open Classic Portfolio">
              <span class="landing-btn-icon">◻</span>
              <span class="landing-btn-label">Classic Portfolio</span>
              <span class="landing-btn-desc">Traditional web portfolio</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const CLASSIC_PORTFOLIO_URL = 'https://denisgusevportfolio-3k9w.onrender.com';

      // ── set false to revert to animated-while-rendering behaviour ──
      const PAUSE_3D_DURING_LIFT = true;
      // ────────────────────────────────────────────────────────────────

      function liftAndReveal(onLifted) {
        if (PAUSE_3D_DURING_LIFT) window.__pauseRender?.();

        const landing = document.getElementById('landing');
        landing.classList.add('lifting');

        setTimeout(onLifted, 500);
        setTimeout(() => {
          landing.remove();
          if (PAUSE_3D_DURING_LIFT) window.__resumeRender?.();
        }, 700);
      }

      document.getElementById('btn-3d').addEventListener('click', () => {
        liftAndReveal(() => { /* 3D scene or loading screen is now behind */ });
      });

      document.getElementById('btn-classic').addEventListener('click', () => {
        // start navigating immediately so the page loads while lifting plays
        window.location.href = CLASSIC_PORTFOLIO_URL;
        liftAndReveal(() => {});
      });
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
