<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="preload" href="/gaming_scene.glb" as="fetch" crossorigin="anonymous" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #050506;
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #app { width: 100%; height: 100%; position: relative; }

      canvas.webgl { position: fixed; top: 0; left: 0; outline: none; z-index: 0; }
      #css-renderer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 1;
      }
      #ui {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 10; pointer-events: none;
      }
      #loading-screen {
        position: absolute; inset: 0; background: #050506;
        display: none; flex-direction: column; align-items: center; justify-content: center;
        color: #EDEDEF; pointer-events: all; transition: opacity 0.8s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      #loading-bar-container {
        width: 300px; height: 2px; background: rgba(255,255,255,0.1);
        margin-top: 24px; border-radius: 2px; overflow: hidden;
      }
      #loading-bar { height: 100%; width: 0%; background: #5E6AD2; transition: width 0.3s ease; border-radius: 2px; }
      #loading-text { margin-top: 16px; font-size: 13px; color: #8A8F98; letter-spacing: 0.1em; text-transform: uppercase; }
      #loading-title { font-size: 28px; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; font-family: 'Archivo', 'Space Grotesk', sans-serif; color: #EDEDEF; }
      #info-overlay {
        position: absolute; bottom: 40px; left: 40px;
        pointer-events: none; opacity: 0; transition: opacity 1s ease;
      }
      #info-overlay.visible { opacity: 1; }
      #info-name { font-size: 32px; font-weight: 300; color: #fff; letter-spacing: 0.15em; text-transform: uppercase; }
      #info-title { font-size: 14px; color: #aaa; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 6px; }
      #monitor-hint {
        position: absolute; bottom: 40px; right: 40px; color: #8A8F98;
        font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
        opacity: 0; transition: opacity 1s ease; pointer-events: none;
      }
      #monitor-hint.visible { opacity: 1; }

      /* ── Entry page ────────────────────────────────────────────── */

      #landing {
        position: fixed; inset: 0; z-index: 200;
        display: flex; align-items: center; justify-content: center;
        /* purple fused into the black — not a separate layer */
        background:
          radial-gradient(ellipse 55% 55% at 50% 50%,  rgba(94,106,210,0.16) 0%, transparent 70%),
          radial-gradient(ellipse 70% 60% at 12% 18%,  rgba(94,106,210,0.22) 0%, transparent 62%),
          radial-gradient(ellipse 55% 70% at 88% 78%,  rgba(75,85,180,0.18) 0%, transparent 58%),
          linear-gradient(160deg, #050506 0%, #09091a 45%, #060610 100%);
        will-change: transform, opacity;
        animation: entryReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* slow-drift blobs baked into the bg */
      #landing::before {
        content: ''; position: absolute; border-radius: 50%; pointer-events: none;
        width: 500px; height: 500px; top: -120px; left: -80px;
        background: radial-gradient(circle, rgba(94,106,210,0.28) 0%, transparent 70%);
        filter: blur(55px);
        animation: blobA 18s ease-in-out infinite alternate;
        will-change: transform;
      }
      #landing::after {
        content: ''; position: absolute; border-radius: 50%; pointer-events: none;
        width: 420px; height: 420px; bottom: -80px; right: -60px;
        background: radial-gradient(circle, rgba(75,85,180,0.24) 0%, transparent 70%);
        filter: blur(50px);
        animation: blobB 22s ease-in-out infinite alternate;
        will-change: transform;
      }
      @keyframes blobA {
        from { transform: translate(0, 0)    scale(1); }
        to   { transform: translate(60px, 40px) scale(1.1); }
      }
      @keyframes blobB {
        from { transform: translate(0, 0)    scale(1); }
        to   { transform: translate(-50px, -30px) scale(1.08); }
      }

      @keyframes entryReveal {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* exit — screen lifts upward */
      #landing.lifting {
        animation: liftUp 0.65s cubic-bezier(0.4, 0, 0.8, 1) forwards;
        pointer-events: none;
      }
      @keyframes liftUp {
        0%   { transform: translateY(0)      scaleX(1);     opacity: 1; }
        12%  { transform: translateY(-8px)   scaleX(0.997); opacity: 1; }
        100% { transform: translateY(-102vh) scaleX(0.97);  opacity: 0.5; }
      }

      /* ── Card ──────────────────────────────────────────────────── */

      #landing-card {
        position: relative; z-index: 1;
        /* barely-visible purple blush — fuses into the bg */
        background: rgba(94, 106, 210, 0.07);
        backdrop-filter: blur(48px) saturate(180%);
        -webkit-backdrop-filter: blur(48px) saturate(180%);
        border: 1px solid rgba(94, 106, 210, 0.28);
        border-radius: 22px;
        padding: 52px 56px;
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.09),
          inset 0 0 0 1px rgba(94,106,210,0.12),
          0 0 80px rgba(94,106,210,0.18),
          0 32px 80px rgba(0,0,0,0.72);
        display: flex; flex-direction: column; align-items: center;
        max-width: 500px; width: 90%;
        opacity: 0;
        animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
      }
      @keyframes cardReveal {
        from { opacity: 0; transform: translateY(28px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0)    scale(1); }
      }

      #landing-name {
        font-size: 30px; font-weight: 600; letter-spacing: -0.03em;
        color: #EDEDEF; text-align: center; font-family: 'Archivo', 'Space Grotesk', sans-serif;
        opacity: 0;
        animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
      }
      #landing-role {
        font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
        text-transform: uppercase; color: rgba(139,151,232,0.7);
        margin-top: 8px; text-align: center;
        opacity: 0;
        animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.38s forwards;
      }
      #landing-divider {
        width: 40px; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(139,151,232,0.6), transparent);
        margin: 30px 0;
        opacity: 0;
        animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.44s forwards;
      }
      #landing-prompt {
        font-size: 10px; font-weight: 600; letter-spacing: 0.16em;
        text-transform: uppercase; color: rgba(139,151,232,0.9);
        margin-bottom: 20px;
        opacity: 0;
        animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.49s forwards;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Buttons ───────────────────────────────────────────────── */

      #landing-options {
        display: flex; gap: 12px; width: 100%;
        opacity: 0;
        animation: fadeUp 0.55s cubic-bezier(0.16,1,0.3,1) 0.54s forwards;
      }

      .landing-btn {
        flex: 1;
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        padding: 24px 16px; border-radius: 16px; cursor: pointer;
        touch-action: manipulation;
        background: rgba(94, 106, 210, 0.08);
        border: 1px solid rgba(94, 106, 210, 0.26);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        color: inherit;
        transition:
          background  0.22s cubic-bezier(0.16,1,0.3,1),
          border-color 0.22s cubic-bezier(0.16,1,0.3,1),
          box-shadow  0.22s cubic-bezier(0.16,1,0.3,1),
          transform   0.15s cubic-bezier(0.16,1,0.3,1);
      }
      .landing-btn:hover {
        background: rgba(94, 106, 210, 0.15);
        border-color: rgba(139, 151, 232, 0.48);
        box-shadow: 0 0 32px rgba(94,106,210,0.25), inset 0 1px 0 rgba(255,255,255,0.1), inset 0 0 0 1px rgba(94,106,210,0.18);
      }
      .landing-btn:active {
        transform: scale(0.97);
        transition-duration: 0.08s;
      }

      .landing-btn-icon {
        font-size: 20px; color: #8B97E8; line-height: 1;
        transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), color 0.2s ease;
      }
      .landing-btn:hover .landing-btn-icon {
        transform: scale(1.2);
        color: #adb7f0;
      }

      .landing-btn-label {
        font-size: 13px; font-weight: 600; color: #EDEDEF;
      }
      .landing-btn-desc {
        font-size: 11px; color: rgba(138,143,152,0.7);
        text-align: center; line-height: 1.5;
      }

      /* respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        #landing, #landing-card, #landing-name, #landing-role,
        #landing-divider, #landing-prompt, #landing-options,
        #landing::before, #landing::after {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="css-renderer"></div>

      <div id="ui">
        <div id="loading-screen">
          <div id="loading-title">Portfolio</div>
          <div id="loading-bar-container"><div id="loading-bar"></div></div>
          <div id="loading-text">Loading assets...</div>
        </div>
        <div id="info-overlay">
          <div id="info-name">Denis Gusev</div>
          <div id="info-title">Software Engineer</div>
        </div>
        <div id="monitor-hint">Click a monitor to explore</div>
      </div>

      <!-- Landing choice screen -->
      <div id="landing">
        <div id="landing-card">
          <div id="landing-name">Denis Gusev</div>
          <div id="landing-role">Software Engineer · Creative Developer</div>
          <div id="landing-divider"></div>
          <div id="landing-prompt">Choose your experience</div>
          <div id="landing-options">
            <button class="landing-btn" id="btn-3d" aria-label="Open 3D Experience">
              <span class="landing-btn-icon">◈</span>
              <span class="landing-btn-label">3D Experience</span>
              <span class="landing-btn-desc">Interactive 3D environment</span>
            </button>
            <button class="landing-btn" id="btn-classic" aria-label="Open Classic Portfolio">
              <span class="landing-btn-icon">◻</span>
              <span class="landing-btn-label">Classic Portfolio</span>
              <span class="landing-btn-desc">Traditional web portfolio</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      const CLASSIC_PORTFOLIO_URL = 'https://denisgusevportfolio-3k9w.onrender.com';

      // ── set false to revert to animated-while-rendering behaviour ──
      const PAUSE_3D_DURING_LIFT = true;
      // ────────────────────────────────────────────────────────────────

      function liftAndReveal(onLifted) {
        if (PAUSE_3D_DURING_LIFT) window.__pauseRender?.();

        const landing = document.getElementById('landing');
        landing.classList.add('lifting');

        setTimeout(onLifted, 500);
        setTimeout(() => {
          landing.remove();
          if (PAUSE_3D_DURING_LIFT) window.__resumeRender?.();
        }, 700);
      }

      document.getElementById('btn-3d').addEventListener('click', () => {
        document.getElementById('loading-screen').style.display = 'flex';
        import('/src/main.ts');
        liftAndReveal(() => {});
      });


      document.getElementById('btn-classic').addEventListener('click', () => {
        // start navigating immediately so the page loads while lifting plays
        window.location.href = CLASSIC_PORTFOLIO_URL;
        liftAndReveal(() => {});
      });
    </script>

  </body>
</html>
